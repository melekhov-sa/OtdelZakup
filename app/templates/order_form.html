<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Новый заказ</title>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 24px; background: #f8f9fa; color: #333; }
        .container { max-width: 600px; margin: 0 auto; }
        h1 { font-size: 20px; margin: 0 0 6px; }
        a { color: #1a73e8; text-decoration: none; }
        .nav { color: #666; font-size: 13px; margin-bottom: 20px; }
        .card { background: #fff; border: 1px solid #ddd; border-radius: 6px; padding: 20px 24px; }
        label { font-size: 13px; color: #555; display: block; margin-bottom: 4px; }
        input[type=text] { width: 100%; padding: 8px 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; box-sizing: border-box; margin-bottom: 14px; }
        .btn { padding: 9px 22px; background: #1a73e8; color: #fff; border: none; border-radius: 4px; font-size: 14px; cursor: pointer; }
        .btn:hover { background: #1557b0; }
    </style>
</head>
<body>
<div class="container">
    <h1>Новый заказ</h1>
    <p class="nav"><a href="/orders">&larr; К заказам</a></p>
    <div class="card">
        <form method="post" action="/orders/new">
            <label>Название заказа</label>
            <input type="text" name="title" required placeholder="Например: Заявка №123 от ООО Ромашка">
            <button type="submit" class="btn">Создать</button>
        </form>
    </div>
</div>
</body>
</html>
