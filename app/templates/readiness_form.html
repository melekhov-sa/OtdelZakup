<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ "Редактировать правило" if is_edit else "Создать правило" }}</title>
    <style>
        body { font-family: sans-serif; margin: 40px auto; padding: 0 20px; max-width: 700px; }
        h1 { margin-bottom: 20px; }
        a { color: #1a73e8; }
        label { display: block; margin-bottom: 4px; font-weight: bold; font-size: 14px; }
        input[type="text"], input[type="number"], textarea, select {
            width: 100%; padding: 8px; margin-bottom: 16px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; box-sizing: border-box;
        }
        textarea { height: 60px; resize: vertical; }
        .checkbox-group { margin-bottom: 16px; }
        .checkbox-group label { display: inline-flex; align-items: center; gap: 4px; font-weight: normal; margin-right: 16px; margin-bottom: 6px; }
        .btn { padding: 10px 20px; color: #fff; border: none; border-radius: 4px; font-size: 14px; cursor: pointer; }
        .btn-save { background: #1a73e8; }
        .btn-save:hover { background: #1557b0; }
    </style>
</head>
<body>
    <h1>{{ "Редактировать правило" if is_edit else "Создать правило" }}</h1>
    <p><a href="/readiness">&larr; Назад к списку</a></p>

    <form method="post" action="{{ '/readiness/' ~ rule.id ~ '/update' if is_edit else '/readiness/create' }}">
        <label for="name">Название</label>
        <input type="text" id="name" name="name" value="{{ rule.name if rule else '' }}" required>

        <label for="description">Описание</label>
        <textarea id="description" name="description">{{ rule.description if rule else '' }}</textarea>

        <label for="item_type">Тип изделия</label>
        <select id="item_type" name="item_type">
            <option value="">Все типы (правило по умолчанию)</option>
            {% for it in item_types %}
                <option value="{{ it }}" {{ 'selected' if rule and rule.item_type == it else '' }}>{{ it }}</option>
            {% endfor %}
        </select>

        <label for="priority">Приоритет (меньше = проверяется раньше)</label>
        <input type="number" id="priority" name="priority" value="{{ rule.priority if rule else 0 }}">

        <label>Обязательные поля</label>
        <div class="checkbox-group">
            {% for key, label in available_fields %}
                <label>
                    <input type="checkbox" name="require_fields" value="{{ key }}"
                        {{ 'checked' if rule and key in rule.require_fields_list else '' }}>
                    {{ label }}
                </label>
            {% endfor %}
        </div>

        <button type="submit" class="btn btn-save">{{ "Сохранить" if is_edit else "Создать" }}</button>
    </form>
</body>
</html>
