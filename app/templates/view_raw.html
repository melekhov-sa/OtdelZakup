<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ filename }} — Отдел закупок</title>
    <style>
        body { font-family: sans-serif; max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        h1 { margin-bottom: 8px; }
        .meta { color: #555; margin-bottom: 20px; }
        .table-wrap { overflow-x: auto; }
        table.table { border-collapse: collapse; width: 100%; font-size: 14px; }
        table.table th, table.table td { border: 1px solid #ddd; padding: 6px 10px; text-align: left; }
        table.table th { background: #f5f5f5; position: sticky; top: 0; }
        table.table tr:nth-child(even) { background: #fafafa; }
        a { color: #1a73e8; }
        .transform-form { background: #f8f9fa; border: 1px solid #ddd; border-radius: 6px; padding: 20px; margin: 24px 0; }
        .transform-form h2 { margin-top: 0; margin-bottom: 12px; font-size: 18px; }
        .checkboxes { display: flex; flex-wrap: wrap; gap: 8px 24px; margin-bottom: 16px; }
        .checkboxes label { cursor: pointer; font-size: 14px; display: flex; align-items: center; gap: 6px; }
        button { padding: 10px 20px; background: #1a73e8; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        button:hover { background: #1557b0; }
    </style>
</head>
<body>
    <h1>{{ filename }}</h1>
    <p class="meta">Всего строк: {{ total_rows }}</p>
    <p><a href="/">&#8592; Загрузить другой файл</a></p>

    <div class="transform-form">
        <h2>Извлечение полей</h2>
        <form action="/transform" method="post">
            <input type="hidden" name="file_id" value="{{ file_id }}">
            <div class="checkboxes">
                {% for key in field_keys %}
                <label>
                    <input type="checkbox" name="fields" value="{{ key }}">
                    {{ extractors[key][0] }}
                </label>
                {% endfor %}
                {% if has_active_template %}
                <label style="border-left: 2px solid #1a73e8; padding-left: 10px; margin-left: 4px;">
                    <input type="checkbox" name="fields" value="normalized_name">
                    Нормализованное наименование
                </label>
                {% endif %}
            </div>
            <label style="display:flex;align-items:center;gap:6px;margin-bottom:14px;font-size:14px">
                <input type="checkbox" name="use_analogs" value="1">
                Поиск с аналогами стандартов
                <span style="font-size:11px;color:#888">(ГОСТ ↔ DIN ↔ ISO)</span>
            </label>
            <button type="submit">Преобразить</button>
        </form>
    </div>

    <div class="table-wrap">
        {{ table_html | safe }}
    </div>
</body>
</html>
