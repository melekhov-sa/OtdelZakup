<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Результат — {{ filename }}</title>
    <style>
        body { font-family: sans-serif; margin: 40px auto; padding: 0 20px; max-width: 98%; }
        h1 { margin-bottom: 8px; }
        .meta { color: #555; margin-bottom: 20px; }
        .panels { display: flex; gap: 24px; }
        .panel { flex: 1; min-width: 0; }
        .panel h2 { font-size: 16px; margin-bottom: 8px; }
        .table-wrap { overflow-x: auto; max-height: 80vh; overflow-y: auto; }
        table.table { border-collapse: collapse; width: 100%; font-size: 13px; }
        table.table th, table.table td { border: 1px solid #ddd; padding: 4px 8px; text-align: left; white-space: nowrap; }
        table.table th { background: #f5f5f5; position: sticky; top: 0; z-index: 1; }
        table.table tr:nth-child(even) { background: #fafafa; }
        a { color: #1a73e8; }
    </style>
</head>
<body>
    <h1>Результат: {{ filename }}</h1>
    <p class="meta">Всего строк: {{ total_rows }} | Обработано строк: {{ processed_rows }}</p>
    <p><a href="/">&#8592; Загрузить другой файл</a></p>

    <div class="panels">
        <div class="panel">
            <h2>Исходная таблица</h2>
            <div class="table-wrap">
                {{ raw_table | safe }}
            </div>
        </div>
        <div class="panel">
            <h2>Преобразованная таблица</h2>
            <div class="table-wrap">
                {{ result_table | safe }}
            </div>
        </div>
    </div>
</body>
</html>
